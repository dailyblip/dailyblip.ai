name: Daily Blip
on:
  schedule:
    # 10:00 UTC = 6:00 AM Eastern (EDT). NOTE: GitHub cron has no timezone
    # support — in winter (EST, UTC-5) this fires at 5:00 AM Eastern.
    # If you prefer 6:00 AM year-round in winter too, change to "0 11 * * *"
    # each November and back to "0 10 * * *" each March.
    - cron: "0 10 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Write the brief
        run: node pipeline/brief.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Pick the tool drop
        run: node pipeline/tooldrop.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Write the archive
        run: node pipeline/archive.js
        env:
          SITE_URL: https://dailyblip.ai
      - name: Commit
        run: |
          git config user.name "dailyblip-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data docs
          git diff --cached --quiet && exit 0
          git commit -m "daily blip: $(date -u +'%Y-%m-%d')"
          git pull --rebase --autostash
          git push
      - name: Send newsletter
        run: node pipeline/newsletter.js
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          SITE_URL: https://dailyblip.ai
