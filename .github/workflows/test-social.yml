name: Test social image
on:
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install

      - name: Generate social image (test)
        run: node pipeline/social.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit
        run: |
          git config user.name "dailyblip-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/social
          git diff --cached --quiet && exit 0
          git commit -m "test: social image $(date -u +'%Y-%m-%d %H:%M') UTC"
          git pull --rebase --autostash
          git push

      - name: Notify (test)
        run: node pipeline/social-notify.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_URL: https://dailyblip.ai
