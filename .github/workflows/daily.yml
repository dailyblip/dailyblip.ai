name: Daily Blip
on:
  schedule:
    - cron: "0 10 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      edition:
        description: "Which edition to run (only used for manual triggers)"
        type: choice
        default: am
        options:
          - am
          - pm

permissions:
  contents: write

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install

      - name: Determine edition
        id: edition
        run: |
          if [ "${{ github.event.schedule }}" = "0 22 * * *" ]; then
            echo "value=pm" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 10 * * *" ]; then
            echo "value=am" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.edition || 'am' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Write the brief (${{ steps.edition.outputs.value }})
        run: node pipeline/brief.js ${{ steps.edition.outputs.value }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Pick the tool drop
        if: steps.edition.outputs.value == 'am'
        run: node pipeline/tooldrop.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Write the archive
        run: node pipeline/archive.js
        env:
          SITE_URL: https://dailyblip.ai

      - name: Commit
        run: |
          git config user.name "dailyblip-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data docs
          git diff --cached --quiet && exit 0
          git commit -m "${{ steps.edition.outputs.value }} blip: $(date -u +'%Y-%m-%d %H:%M') UTC"
          git pull --rebase --autostash
          git push

      - name: Send newsletter
        if: steps.edition.outputs.value == 'am'
        run: node pipeline/newsletter.js
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          SITE_URL: https://dailyblip.ai
