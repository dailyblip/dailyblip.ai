name: Ingest feed
on:
  schedule:
    - cron: "*/20 * * * *"   # GitHub may delay scheduled runs a few minutes
  workflow_dispatch: {}       # allows manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: ingest-pipeline
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Run ingest
        run: node pipeline/ingest.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      - name: Commit feed updates
        run: |
          git config user.name "dailyblip-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data docs/data docs/feed.xml
          git diff --cached --quiet && exit 0
          git commit -m "feed: $(date -u +'%Y-%m-%d %H:%M') UTC"
          git pull --rebase --autostash
          git push
