name: Weekly curator
on:
  schedule:
    - cron: "0 15 * * 0"   # Sundays 15:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  curate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Heal sources + check tool graveyard
        run: node pipeline/curator.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit
        run: |
          git config user.name "dailyblip-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase
          git add pipeline/sources.json data
          git diff --cached --quiet || git commit -m "curator: $(date -u +'%Y-%m-%d')"
          git push
